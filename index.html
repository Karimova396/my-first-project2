<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALC_X — Ultra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-wrap">
        <div class="bg-grid"></div>
        <div class="bg-glow-1"></div>
        <div class="bg-glow-2"></div>
        <canvas id="particles"></canvas>
    </div>

    <!-- Main wrapper -->
    <div class="scene">

        <!-- Corner decorations -->
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div class="calc-shell">

            <!-- Top bar -->
            <div class="top-bar">
                <div class="top-bar-left">
                    <div class="status-dot"></div>
                    <span class="status-text">ONLINE</span>
                </div>
                <div class="brand">
                    <span class="brand-text">CALC</span>
                    <span class="brand-x">_X</span>
                    <span class="brand-version">v2.0</span>
                </div>
                <button class="theme-btn" id="themeToggle">
                    <span class="theme-icon" id="themeIcon">☀</span>
                </button>
            </div>

            <!-- Scanline overlay -->
            <div class="scanlines"></div>

            <!-- Display -->
            <div class="display-outer">
                <div class="display-corner dtl"></div>
                <div class="display-corner dtr"></div>
                <div class="display-corner dbl"></div>
                <div class="display-corner dbr"></div>
                <div class="display-inner">
                    <div class="display-label">INPUT</div>
                    <div class="display-expr" id="expression">&nbsp;</div>
                    <div class="display-main" id="display">0</div>
                    <div class="display-cursor"></div>
                </div>
            </div>

            <!-- History strip -->
            <div class="history-strip" id="historyStrip">
                <span class="history-label">REC //</span>
                <span class="history-text" id="historyText">—</span>
            </div>

            <!-- Divider -->
            <div class="divider">
                <span class="divider-line"></span>
                <span class="divider-icon">◈</span>
                <span class="divider-line"></span>
            </div>

            <!-- Button pad -->
            <div class="pad">

                <!-- Row 0: extra functions -->
                <div class="btn-row extra-row">
                    <button class="btn e-btn" data-action="backspace">⌫ DEL</button>
                    <button class="btn e-btn" data-action="sqrt">√x</button>
                    <button class="btn e-btn" data-action="square">x²</button>
                    <button class="btn e-btn" data-action="inverse">1/x</button>
                </div>

                <!-- Row 1 -->
                <div class="btn-row">
                    <button class="btn f-btn" data-action="clear">AC</button>
                    <button class="btn f-btn" data-action="sign">±</button>
                    <button class="btn f-btn" data-action="percent">%</button>
                    <button class="btn o-btn" data-action="op" data-value="÷">÷</button>
                </div>

                <!-- Row 2 -->
                <div class="btn-row">
                    <button class="btn n-btn" data-action="num" data-value="7">7</button>
                    <button class="btn n-btn" data-action="num" data-value="8">8</button>
                    <button class="btn n-btn" data-action="num" data-value="9">9</button>
                    <button class="btn o-btn" data-action="op" data-value="×">×</button>
                </div>

                <!-- Row 3 -->
                <div class="btn-row">
                    <button class="btn n-btn" data-action="num" data-value="4">4</button>
                    <button class="btn n-btn" data-action="num" data-value="5">5</button>
                    <button class="btn n-btn" data-action="num" data-value="6">6</button>
                    <button class="btn o-btn" data-action="op" data-value="−">−</button>
                </div>

                <!-- Row 4 -->
                <div class="btn-row">
                    <button class="btn n-btn" data-action="num" data-value="1">1</button>
                    <button class="btn n-btn" data-action="num" data-value="2">2</button>
                    <button class="btn n-btn" data-action="num" data-value="3">3</button>
                    <button class="btn o-btn" data-action="op" data-value="+">+</button>
                </div>

                <!-- Row 5 -->
                <div class="btn-row last-row">
                    <button class="btn n-btn zero-btn" data-action="num" data-value="0">0</button>
                    <button class="btn n-btn" data-action="dot">.</button>
                    <button class="btn eq-btn" data-action="equal">=</button>
                </div>

            </div>

            <!-- Bottom bar -->
            <div class="bottom-bar">
                <span class="bottom-text">PRECISION: HIGH</span>
                <span class="bottom-sep">|</span>
                <span class="bottom-text" id="modeLabel">MODE: DARK</span>
                <span class="bottom-sep">|</span>
                <span class="bottom-text">KB: ON</span>
            </div>

        </div>
    </div>

    <script src="js.js"></script>
</body>
</html>
